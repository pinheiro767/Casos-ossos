<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casos Clínicos EF - PWA Completo</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1020"><style>
body{margin:0;font-family:Arial;background:#0b1020;color:#fff}
.container{padding:15px}
.card{background:#121933;margin-bottom:15px;padding:15px;border-radius:15px}
button{padding:10px;border:none;border-radius:10px;margin-top:10px;cursor:pointer;background:#4c6fff;color:#fff}
textarea{width:100%;padding:10px;border-radius:10px;margin-top:10px}
.hidden{display:none}
img{width:100%;margin-top:10px;border-radius:10px}
</style></head><body>
<div class="container">
<h2>Casos Clínicos – Educação Física</h2>
<div id="casos"></div>
</div><script>

const CASOS = [
{
 titulo:"Fratura de clavícula",
 texto:"Aluno caiu com braço estendido e apresenta dor intensa no ombro.",
 pergunta:"Identifique ossos, divisão do esqueleto, termos anatômicos da lesão e plano do movimento.",
 resposta:"Clavícula e escápula; esqueleto apendicular; lateral e proximal; plano frontal."
},
{
 titulo:"Luxação de ombro",
 texto:"Aluno realizou arremesso e sentiu deslocamento do ombro.",
 pergunta:"Descreva ossos, plano, posição do braço e relação proximal/distal.",
 resposta:"Úmero e escápula; plano frontal/transversal; lateral; ombro proximal à mão."
},
{
 titulo:"Dor lateral cotovelo",
 texto:"Aluno sente dor externa após esforço.",
 pergunta:"Identifique ossos, termo anatômico e posição relativa.",
 resposta:"Úmero, rádio e ulna; lateral; distal ao ombro."
},
{
 titulo:"Fratura rádio distal",
 texto:"Queda com apoio da mão.",
 pergunta:"Explique osso, termo distal e divisão.",
 resposta:"Rádio distal; distal = mais longe do tronco; apendicular."
},
{
 titulo:"Elevação lateral",
 texto:"Dor ao levantar braço.",
 pergunta:"Identifique plano, eixo e movimento.",
 resposta:"Plano frontal; eixo ântero-posterior; abdução."
},
{
 titulo:"Lesão joelho",
 texto:"Mudança brusca de direção.",
 pergunta:"Descreva ossos, plano e relações.",
 resposta:"Fêmur, tíbia, patela; plano sagital; joelho inferior ao quadril e proximal ao pé."
},
{
 titulo:"Fratura tíbia",
 texto:"Impacto direto.",
 pergunta:"Indique posição anatômica e divisão.",
 resposta:"Tíbia; inferior; distal ao fêmur; apendicular."
},
{
 titulo:"Entorse tornozelo",
 texto:"Pisou em falso.",
 pergunta:"Explique ossos, termo e plano.",
 resposta:"Tíbia, fíbula, tálus; lateral; plano frontal."
},
{
 titulo:"Fratura fêmur",
 texto:"Queda forte.",
 pergunta:"Descreva posição e divisão.",
 resposta:"Fêmur; inferior ao tronco; apendicular."
},
{
 titulo:"Dor anterior joelho",
 texto:"Dor na frente do joelho.",
 pergunta:"Identifique termo, ossos e plano.",
 resposta:"Anterior; patela, fêmur, tíbia; plano sagital."
},
{
 titulo:"Dor lombar",
 texto:"Após levantamento de peso.",
 pergunta:"Descreva estrutura e divisão.",
 resposta:"Coluna lombar; axial; posterior ao abdome."
},
{
 titulo:"Hipercifose",
 texto:"Ombros projetados à frente.",
 pergunta:"Descreva termos e estrutura.",
 resposta:"Coluna torácica; anteriorização."
},
{
 titulo:"Trauma costelas",
 texto:"Impacto lateral.",
 pergunta:"Identifique ossos e termo.",
 resposta:"Costelas; lateral; axial."
},
{
 titulo:"Impacto esterno",
 texto:"Trauma frontal.",
 pergunta:"Descreva localização e divisão.",
 resposta:"Esterno; anterior e medial; axial."
},
{
 titulo:"Dor medial",
 texto:"Dor interna joelho.",
 pergunta:"Explique termo e relação.",
 resposta:"Medial; próximo ao plano mediano."
},
{
 titulo:"Dor lateral",
 texto:"Dor externa tornozelo.",
 pergunta:"Explique termo e função.",
 resposta:"Lateral; afastado do plano mediano."
},
{
 titulo:"Lesão proximal",
 texto:"Dor perto do ombro.",
 pergunta:"Explique termo e comparação.",
 resposta:"Proximal; próximo ao tronco."
},
{
 titulo:"Lesão distal",
 texto:"Dor perto do pé.",
 pergunta:"Explique termo.",
 resposta:"Distal; longe do tronco."
},
{
 titulo:"Região anterior",
 texto:"Dor na frente.",
 pergunta:"Explique termo.",
 resposta:"Anterior; frente do corpo."
},
{
 titulo:"Região posterior",
 texto:"Dor atrás.",
 pergunta:"Explique termo.",
 resposta:"Posterior; parte de trás."
},
{
 titulo:"Posição anatômica",
 texto:"Palmas para trás.",
 pergunta:"Está correto?",
 resposta:"Não; palmas devem estar para frente."
},
{
 titulo:"Flexão tronco",
 texto:"Inclinar para frente.",
 pergunta:"Plano e eixo?",
 resposta:"Sagital; eixo transversal."
},
{
 titulo:"Rotação tronco",
 texto:"Giro do tronco.",
 pergunta:"Plano e eixo?",
 resposta:"Transversal; eixo longitudinal."
},
{
 titulo:"Abdução",
 texto:"Braço lateral.",
 pergunta:"Plano e eixo?",
 resposta:"Frontal; eixo ântero-posterior."
},
{
 titulo:"Movimento joelho",
 texto:"Flexão/extensão.",
 pergunta:"Plano e eixo?",
 resposta:"Sagital; eixo transversal."
},
{
 titulo:"Salto",
 texto:"Dor ao aterrissar.",
 pergunta:"Descreva ossos e relações.",
 resposta:"Fêmur e tíbia; distal/proximal."
},
{
 titulo:"Corrida",
 texto:"Movimentos alternados.",
 pergunta:"Termo anatômico?",
 resposta:"Contralateral."
},
{
 titulo:"Divisão corpo",
 texto:"Linha direita/esquerda.",
 pergunta:"Plano?",
 resposta:"Plano sagital."
},
{
 titulo:"Movimento circular",
 texto:"Braço girando.",
 pergunta:"Nome?",
 resposta:"Circundução."
},
{
 titulo:"Lesão combinada",
 texto:"Dor ombro e joelho.",
 pergunta:"Divisões?",
 resposta:"Apendicular superior e inferior."
}
];

function render(){
  const c = document.getElementById("casos");
  CASOS.forEach((caso,i)=>{
    c.innerHTML += `
    <div class="card">
      <h3>Caso ${i+1} – ${caso.titulo}</h3>
      <p>${caso.texto}</p>
      <b>Pergunta:</b>
      <p>${caso.pergunta}</p>

      <button onclick="mostrar(${i})">Mostrar resposta</button>
      <div id="r${i}" class="hidden"><b>${caso.resposta}</b></div>

      <textarea id="t${i}" placeholder="Anotação..."></textarea><input type="file" onchange="foto(event,${i})">
  <img id="img${i}" style="display:none">

  <button onclick="window.print()">Exportar PDF</button>
</div>`;

}); }

function mostrar(i){ const senha = prompt("Digite a senha:"); if(senha === "prof2026"){ document.getElementById("r"+i).classList.remove("hidden"); } else alert("Senha incorreta"); }

function foto(e,i){ const file = e.target.files[0]; const img = document.getElementById("img"+i); img.src = URL.createObjectURL(file); img.style.display = "block"; }

// salvar window.addEventListener("input",(e)=>{ if(e.target.tagName === "TEXTAREA"){ localStorage.setItem(e.target.id, e.target.value); } });

window.onload = ()=>{ render(); CASOS.forEach((_,i)=>{ const v = localStorage.getItem("t"+i); if(v) document.getElementById("t"+i).value = v; }); };

if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js'); }

</script></body>
</html>
