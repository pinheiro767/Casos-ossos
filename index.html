<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casos Clínicos EF</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1020">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1020;
  color:#fff;
}

.container{padding:15px;}

.card{
  background:#121933;
  margin-bottom:15px;
  padding:15px;
  border-radius:15px;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  background:#4c6fff;
  color:#fff;
}

textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

input{margin-top:10px;}

.hidden{display:none;}

img{width:100%;margin-top:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="container">
<h2>Casos Clínicos – Educação Física</h2>

<div id="casos"></div>

</div>

<script>

const CASOS = [
{
titulo:"Fratura de clavícula",
texto:"Aluno caiu com braço estendido e apresenta dor no ombro.",
resposta:"Clavícula, esqueleto apendicular, região lateral ao tronco."
},
{
titulo:"Luxação de ombro",
texto:"Aluno realizou arremesso e sentiu deslocamento no ombro.",
resposta:"Úmero e escápula, plano frontal, posição lateral."
},
{
titulo:"Dor lateral no cotovelo",
texto:"Aluno apresenta dor externa após esforço repetitivo.",
resposta:"Úmero, rádio e ulna, região lateral."
},
{
titulo:"Fratura de rádio distal",
texto:"Queda com apoio da mão gerou dor no punho.",
resposta:"Rádio distal, esqueleto apendicular."
},
{
titulo:"Elevação lateral com dor",
texto:"Aluno sente dor ao levantar o braço.",
resposta:"Plano frontal, eixo ântero-posterior."
},
{
titulo:"Lesão no joelho",
texto:"Mudança brusca de direção com dor.",
resposta:"Fêmur, tíbia, plano sagital."
},
{
titulo:"Fratura de tíbia",
texto:"Impacto direto na perna.",
resposta:"Tíbia, membro inferior, apendicular."
},
{
titulo:"Entorse de tornozelo",
texto:"Aluno pisa em falso.",
resposta:"Tíbia, fíbula e tálus, região lateral."
},
{
titulo:"Fratura de fêmur",
texto:"Queda com impacto forte.",
resposta:"Fêmur, inferior ao tronco."
},
{
titulo:"Dor anterior no joelho",
texto:"Dor na frente do joelho.",
resposta:"Patela, região anterior."
},
{
titulo:"Dor lombar",
texto:"Após levantamento de peso.",
resposta:"Coluna lombar, esqueleto axial."
},
{
titulo:"Hipercifose",
texto:"Postura com ombros à frente.",
resposta:"Coluna torácica, anteriorização."
},
{
titulo:"Trauma costal",
texto:"Impacto lateral no tórax.",
resposta:"Costelas, região lateral."
},
{
titulo:"Impacto no esterno",
texto:"Trauma frontal.",
resposta:"Esterno, anterior e medial."
},
{
titulo:"Dor medial no joelho",
texto:"Parte interna do joelho.",
resposta:"Região medial."
},
{
titulo:"Dor lateral tornozelo",
texto:"Parte externa do pé.",
resposta:"Região lateral."
},
{
titulo:"Lesão proximal braço",
texto:"Dor perto do ombro.",
resposta:"Proximal."
},
{
titulo:"Lesão distal perna",
texto:"Dor perto do pé.",
resposta:"Distal."
},
{
titulo:"Dor anterior",
texto:"Dor na frente da perna.",
resposta:"Anterior."
},
{
titulo:"Dor posterior",
texto:"Dor atrás da coxa.",
resposta:"Posterior."
},
{
titulo:"Posição incorreta",
texto:"Palmas para trás.",
resposta:"Não está em posição anatômica."
},
{
titulo:"Flexão de tronco",
texto:"Inclinar para frente.",
resposta:"Plano sagital."
},
{
titulo:"Rotação tronco",
texto:"Giro do tronco.",
resposta:"Plano transversal."
},
{
titulo:"Abdução ombro",
texto:"Braço lateral.",
resposta:"Plano frontal."
},
{
titulo:"Movimento joelho",
texto:"Flexão/extensão.",
resposta:"Sagital, eixo transversal."
},
{
titulo:"Salto",
texto:"Dor ao aterrissar.",
resposta:"Fêmur, tíbia, distal/proximal."
},
{
titulo:"Corrida",
texto:"Movimentos alternados.",
resposta:"Contralateral."
},
{
titulo:"Divisão do corpo",
texto:"Linha direita/esquerda.",
resposta:"Plano sagital."
},
{
titulo:"Movimento circular",
texto:"Braço girando.",
resposta:"Circundução, múltiplos planos."
},
{
titulo:"Lesão combinada",
texto:"Dor no ombro e joelho.",
resposta:"Apendicular superior e inferior."
}
];

function render(){
  const container = document.getElementById("casos");

  CASOS.forEach((c,i)=>{

    container.innerHTML += `
    <div class="card">
      <h3>Caso ${i+1} – ${c.titulo}</h3>
      <p>${c.texto}</p>

      <button onclick="mostrar(${i})">Mostrar resposta</button>
      <div id="r${i}" class="hidden"><b>${c.resposta}</b></div>

      <textarea id="t${i}" placeholder="Anotação..."></textarea>

      <input type="file" onchange="foto(event,${i})">
      <img id="img${i}" style="display:none">

      <button onclick="pdf()">Exportar PDF</button>
    </div>
    `;
  });
}

function mostrar(i){
  const senha = prompt("Senha:");
  if(senha==="prof2026"){
    document.getElementById("r"+i).classList.remove("hidden");
  } else alert("Senha incorreta");
}

function foto(e,i){
  const file = e.target.files[0];
  const img = document.getElementById("img"+i);
  img.src = URL.createObjectURL(file);
  img.style.display="block";
}

function pdf(){window.print();}

// salvar anotação
document.addEventListener("input",(e)=>{
  if(e.target.tagName==="TEXTAREA"){
    localStorage.setItem(e.target.id,e.target.value);
  }
});

window.onload=()=>{
  render();
  CASOS.forEach((c,i)=>{
    const val = localStorage.getItem("t"+i);
    if(val) document.getElementById("t"+i).value=val;
  });
}

// SW
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
